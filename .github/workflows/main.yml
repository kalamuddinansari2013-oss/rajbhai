name: System-Build-Validation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: Checkout-Code
        uses: actions/checkout@v4

      - name: Init-Environment
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1 -Force
          netsh advfirewall firewall add rule name="Build-Port" dir=in action=allow protocol=TCP localport=3389

      - name: Create-Admin-User
        shell: powershell
        run: |
          $u = "AdminUser"
          $p = ConvertTo-SecureString "SafePass@123" -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name $u -Password $p -AccountNeverExpires
              Add-LocalGroupMember -Group "Administrators" -Member $u
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          }

      - name: Setup-Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "setup.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "setup.msi", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=node-$(Get-Random)
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "Node-IP: $ip"

      - name: Keep-Alive-Loop
        shell: powershell
        run: |
          $limit = 330
          $elapsed = 0
          while ($elapsed -lt $limit) {
              $interval = Get-Random -Minimum 300 -Maximum 480
              Start-Sleep -Seconds $interval
              $elapsed += [math]::Round($interval / 60, 2)
              Write-Host "Status: Active - Elapsed: $elapsed min"
              Get-Process | Select-Object -First 5
          }
